<!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  JFT AGRO OVERSEAS — UNIVERSAL SEO HEAD SNIPPET                            ║
  ║  Add the lines below to EVERY page's <head> that is missing them.          ║
  ║  Replace PAGE_TITLE, PAGE_URL, PAGE_DESCRIPTION, PAGE_IMAGE per page.      ║
  ╚══════════════════════════════════════════════════════════════════════════════╝

  STEP 1: Add to every page that is missing the robots meta tag:
-->

<!-- ── Robots / Crawl Directives ─────────────────────────────────── -->
<meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1">
<meta name="author" content="JFT Agro Overseas">

<!-- ── PWA / App Identity ─────────────────────────────────────────── -->
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/images/jft logo.png">

<!-- ── Open Graph (Social Sharing) — replace values per page ──────── -->
<meta property="og:locale" content="en_US">
<meta property="og:site_name" content="JFT Agro Overseas">
<meta property="og:type" content="product"><!-- or "article" for blog, "website" for landing pages -->
<meta property="og:url" content="https://jftagro.com/PAGE_URL">
<meta property="og:title" content="PAGE_TITLE | JFT Agro Overseas">
<meta property="og:description" content="PAGE_DESCRIPTION">
<meta property="og:image" content="https://jftagro.com/images/products/basmati_rice_hd.webp">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:alt" content="JFT Agro Overseas — Premium Indian Agricultural Exports">

<!-- ── Twitter / X Card ───────────────────────────────────────────── -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:site" content="@jftagro">
<meta name="twitter:title" content="PAGE_TITLE | JFT Agro">
<meta name="twitter:description" content="PAGE_DESCRIPTION">
<meta name="twitter:image" content="https://jftagro.com/images/products/basmati_rice_hd.webp">

<!-- ── Geo / Location Signals (Bing, Yandex, regional search) ─────── -->
<meta name="geo.region" content="IN-MH">
<meta name="geo.placename" content="Navi Mumbai, Maharashtra, India">
<meta name="geo.position" content="19.0330;73.0297">
<meta name="ICBM" content="19.0330, 73.0297">

<!-- ── hreflang (International targeting) ─────────────────────────── -->
<!-- Replace PAGE_URL with the actual filename, e.g. 1121-basmati-rice-exporter.html -->
<link rel="alternate" hreflang="en"       href="https://jftagro.com/PAGE_URL">
<link rel="alternate" hreflang="ar"       href="https://jftagro.com/ar/PAGE_URL">
<link rel="alternate" hreflang="fr"       href="https://jftagro.com/fr/PAGE_URL">
<link rel="alternate" hreflang="ru"       href="https://jftagro.com/ru/PAGE_URL">
<link rel="alternate" hreflang="es"       href="https://jftagro.com/es/PAGE_URL">
<link rel="alternate" hreflang="pt"       href="https://jftagro.com/pt/PAGE_URL">
<link rel="alternate" hreflang="vi"       href="https://jftagro.com/vi/PAGE_URL">
<link rel="alternate" hreflang="ms"       href="https://jftagro.com/ms/PAGE_URL">
<link rel="alternate" hreflang="id"       href="https://jftagro.com/id/PAGE_URL">
<link rel="alternate" hreflang="th"       href="https://jftagro.com/th/PAGE_URL">
<link rel="alternate" hreflang="si"       href="https://jftagro.com/si/PAGE_URL">
<link rel="alternate" hreflang="x-default" href="https://jftagro.com/PAGE_URL">

<!-- ── BreadcrumbList Schema (for product pages) ──────────────────── -->
<!-- Replace PRODUCT_NAME and PAGE_URL per page -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {"@type": "ListItem", "position": 1, "name": "Home", "item": "https://jftagro.com/"},
    {"@type": "ListItem", "position": 2, "name": "Products", "item": "https://jftagro.com/products.html"},
    {"@type": "ListItem", "position": 3, "name": "PRODUCT_NAME", "item": "https://jftagro.com/PAGE_URL"}
  ]
}
</script>
