  <div class="jft-page-hero-glow"></div>
  <div class="jft-page-hero-gold-stripe"></div>

  <div class="jft-wide-container jft-page-hero-inner">
    <!-- Breadcrumb -->

      <a href="index.html">Home</a>
      <i class="fa-solid fa-chevron-right"></i>
      <span style="color:var(--gold)">PAGE_BREADCRUMB_LABEL</span>
    </nav>

    <!-- Tag + H1 + subtitle + CTA -->

      <i class="fa-solid fa-ICON_CLASS"></i> PAGE_TAG
    </span>

      PAGE_H1_LINE1<br><em>PAGE_H1_ITALIC</em>
    </h1>

      <span class="jft-hero-tag"><i class="fa-solid fa-certificate"></i> ISO 9001:2015</span>
      <span class="jft-hero-tag"><i class="fa-solid fa-globe"></i> 20+ Countries</span>

  </div>
</section>
